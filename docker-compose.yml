# =============================================================================
# Football Intelligence Dashboard - Docker Compose
# =============================================================================

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: football-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-football_intelligence}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: football-redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: football-backend
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/football_intelligence.db
      - DATABASE_URL_SYNC=sqlite:////app/football_intelligence.db
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://2.25.140.67:3010,http://2.25.140.67:8001,http://ligas.bronks.ia.br,https://ligas.bronks.ia.br,http://ligas.bronks.ia.br:3010
      - REDIS_URL=redis://redis:6379/0

  # --- Celery Worker ---
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: football-worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/football_intelligence.db
      - DATABASE_URL_SYNC=sqlite:////app/football_intelligence.db
      - REDIS_URL=redis://redis:6379/0

  # --- Celery Beat Scheduler ---
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: football-beat
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/football_intelligence.db
      - DATABASE_URL_SYNC=sqlite:////app/football_intelligence.db
      - REDIS_URL=redis://redis:6379/0

  # --- Next.js Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: football-frontend
    ports:
      - "3010:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:
  redisdata:
